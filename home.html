<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Explore Hotels & Patient Portal</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Add smooth custom transitions on state updates */
        .state-transition {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
    </style>
</head>
<body class="bg-gray-50 flex flex-col min-h-screen">
    
    <nav class="navbar">
        <div class="logo">🏠 Explore</div>
        <div class="search-box">
            <input type="text" placeholder="Search destination">
            <button class="search-btn">Search</button>
        </div>
        <div class="nav-links">
            <a href="#">Your hotel</a>
            <a href="#">Log Out</a>
            <a href="#" id="login-btn">Sign Up</a>
        </div>
    </nav>

    <div class="categories">
        <div class="category">🔥<p>Trending</p></div>
        <div class="category">🛏️<p>Rooms</p></div>
        <div class="category">🏙️<p>Iconic Cities</p></div>
        <div class="category">⛰️<p>Mountains</p></div>
        <div class="category">🏊<p>Amazing Pools</p></div>
        <div class="category">🏰<p>Castles</p></div>
        <div class="category">⛺<p>Camping</p></div>
    </div>

    <div class="toggle-container">
        <div class="toggle-box">
            Display total after taxes ⭕
        </div>
    </div> 

    <div id="app" class="max-w-6xl mx-auto p-6 flex-grow">
        </div>

    <footer class="footer">
        <hr>
        <div class="footer-bottom">
            <p>© 2025 Explore Hotel Booking. All rights reserved.</p>
            <div class="social-icons">
                <a href="#">🌐</a>
                <a href="#">📘</a>
                <a href="#">📷</a>
                <a href="#">🐦</a>
            </div>
        </div>
    </footer>

    <script src="app.js"></script>
</body>
</html>
